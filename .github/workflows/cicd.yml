name: Laravel Docker CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mattthecoder/chirper

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:dev-${{ github.run_id }} .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:dev-${{ github.run_id }}
